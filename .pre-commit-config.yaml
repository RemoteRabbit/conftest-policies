---
default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-yaml
      - id: check-json
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint

  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.106.0
    hooks:
      - id: terraform_fmt

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - security
          - docs
          - style
          - refactor
          - perf
          - test
          - build
          - ci
          - chore
          - revert

  - repo: local
    hooks:
      - id: conftest-verify
        name: conftest verify (rego unit tests)
        description: Run rego unit tests under policy/
        entry: conftest verify -p policy/
        language: system
        pass_filenames: false
        files: '^policy/.*\.rego$'

      - id: gen-docs
        name: regenerate docs/POLICIES.md
        description: Regenerate the policy reference from OPA METADATA
        entry: scripts/gen-docs.sh
        language: script
        pass_filenames: false
        files: '^policy/.*\.rego$'

      - id: hcl-policy-self-check
        name: HCL policy self-check (fixtures)
        description: Run HCL policies against tests/fixtures/terraform/hcl and assert expected pass/fail.
        entry: scripts/test-fixtures.sh hcl
        language: script
        pass_filenames: false
        files: '^(policy/terraform/(hcl|lib)/|tests/fixtures/terraform/hcl/).*$'
