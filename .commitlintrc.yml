extends:
  - "@commitlint/config-conventional"
rules:
  type-enum:
    - 2 # error
    - always
    - - feat
      - fix
      - security
      - docs
      - style
      - refactor
      - perf
      - test
      - build
      - ci
      - chore
      - revert
  # Renovate (and release-please) commit bodies/footers frequently contain long
  # URLs, tables and release notes that blow past the default 100-char limit.
  body-max-line-length: [0]
  footer-max-line-length: [0]
  body-max-length: [0]
  footer-max-length: [0]
  # Allow sentence-case subjects (e.g. "fix: Have release PR recheck ...").
  subject-case: [0]
  # Scopes are optional for humans but, when present, must come from this enum.
  # Add new scopes here (and, for policy domains, create policy/<scope>/ so the
  # per-domain changelog generator picks them up).
  scope-empty: [0]
  scope-enum:
    - 2 # error
    - always
    - # Policy domains (one per top-level policy/<scope>/ directory)
      - terraform
      - kubernetes
      - dockerfile
      - helm
      # Infra / meta scopes
      - github-actions
      - pre-commit
      - ci-tooling
      - deps
      - docs
      - repo
