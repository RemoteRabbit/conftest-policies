# git-cliff configuration for per-policy-domain changelogs.
#
# release-please still owns the top-level CHANGELOG.md. This config is consumed
# by scripts/gen-scope-changelogs.sh to produce docs/changelogs/<domain>.md, one
# per top-level policy/<domain>/ directory, filtered by --include-path.

[changelog]
header = """
# Changelog
<!-- DO NOT EDIT: regenerated by `make changelogs` from git history. -->

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for c in commits %}\
- {% if c.scope %}**{{ c.scope }}:** {% endif %}{{ c.message | upper_first }}\
{% if c.id %} ({{ c.id | truncate(length=7, end="") }}){% endif %}
{% endfor %}\
{% endfor %}

"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
sort_commits = "newest"
topo_order = false
filter_commits = true

commit_parsers = [
  { message = "^feat",     group = "Features" },
  { message = "^fix",      group = "Bug Fixes" },
  { message = "^security", group = "Security" },
  { message = "^perf",     group = "Performance" },
  { message = "^revert",   group = "Reverts" },
  { message = "^docs",     group = "Documentation" },
  { message = "^refactor", group = "Refactors" },
  { message = "^build",    group = "Dependencies" },
  { message = "^test",     skip = true },
  { message = "^ci",       skip = true },
  { message = "^chore",    skip = true },
]
