---
name: ci
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
env:
  # renovate: datasource=github-releases depName=open-policy-agent/conftest
  CONFTEST_VERSION: "0.68.2"
  # renovate: datasource=github-releases depName=hashicorp/terraform
  TERRAFORM_VERSION: "1.15.5"
  # renovate: datasource=github-releases depName=open-policy-agent/opa
  OPA_VERSION: "1.17.0"
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false
      - name: Install conftest
        run: |
          curl -sSL -o /tmp/conftest.tgz \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          tar -xzf /tmp/conftest.tgz -C /tmp conftest
          sudo install -m 0755 /tmp/conftest /usr/local/bin/conftest
          conftest --version
      - name: Install opa
        run: |
          curl -sSL -o /tmp/opa \
            "https://openpolicyagent.org/downloads/v${OPA_VERSION}/opa_linux_amd64_static"
          sudo install -m 0755 /tmp/opa /usr/local/bin/opa
          opa version
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14.4"
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
      - name: Validate renovate.json
        run: >
          npx --yes --package renovate --
          renovate-config-validator --strict .github/renovate.json
      - name: Conftest verify (rego unit tests)
        run: conftest verify -p policy/
      - name: Docs are up to date
        run: make docs-check
      - name: Generate plans for plan fixtures
        run: |
          # Only fixtures under tests/fixtures/terraform/plan/ have full provider
          # config and are intended for `terraform plan`. HCL fixtures are
          # parsed directly by conftest and need no plan.
          mapfile -t fixtures < <(find tests/fixtures/terraform/plan -type f -name 'main.tf' -printf '%h\n' | sort -u)
          if [[ ${#fixtures[@]} -eq 0 ]]; then
            echo "No plan fixtures found under tests/fixtures/terraform/plan" >&2
            exit 1
          fi
          for fixture in "${fixtures[@]}"; do
            echo "::group::$fixture"
            ./scripts/generate-plan.sh "$fixture"
            echo "::endgroup::"
          done
      - name: Conftest test against fixtures (HCL + plan)
        run: ./scripts/test-fixtures.sh all
