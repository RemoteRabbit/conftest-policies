name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  # renovate: datasource=github-releases depName=open-policy-agent/conftest
  CONFTEST_VERSION: "0.56.0"

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install conftest
        run: |
          curl -sSL -o /tmp/conftest.tgz \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          tar -xzf /tmp/conftest.tgz -C /tmp conftest
          sudo install -m 0755 /tmp/conftest /usr/local/bin/conftest
          conftest --version

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Publish policies to GHCR
        env:
          REPO_LC: ${{ github.repository }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          REPO_LC=$(echo "$REPO_LC" | tr '[:upper:]' '[:lower:]')
          conftest push "oci://ghcr.io/${REPO_LC}:${VERSION}" policy/
          conftest push "oci://ghcr.io/${REPO_LC}:latest" policy/
