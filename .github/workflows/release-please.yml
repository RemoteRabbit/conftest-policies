---
name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  # renovate: datasource=github-releases depName=open-policy-agent/conftest
  CONFTEST_VERSION: "0.68.2"
  # renovate: datasource=github-releases depName=orhun/git-cliff
  GIT_CLIFF_VERSION: "2.13.1"

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      # When release-please has an open release PR, regenerate the per-kind
      # changelogs under docs/changelogs/ from the post-merge git history on
      # main and push the result onto the release PR branch. This is the
      # single point where those files are kept fresh: PR CI doesn't gate on
      # them because squash-merge rewrites commit SHAs (and appends `(#NN)`
      # to subjects), so the rendered output naturally drifts from anything
      # generated on a feature branch.
      - name: Checkout release PR branch
        if: steps.release.outputs.pr
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-cliff
        if: steps.release.outputs.pr
        run: |
          curl -sSL -o /tmp/git-cliff.tgz \
            "https://github.com/orhun/git-cliff/releases/download/v${GIT_CLIFF_VERSION}/git-cliff-${GIT_CLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf /tmp/git-cliff.tgz -C /tmp
          sudo install -m 0755 "/tmp/git-cliff-${GIT_CLIFF_VERSION}/git-cliff" /usr/local/bin/git-cliff
          git-cliff --version

      - name: Regenerate per-kind changelogs and push to release PR
        if: steps.release.outputs.pr
        run: |
          set -euo pipefail
          ./scripts/gen-scope-changelogs.sh
          if git diff --quiet -- docs/changelogs; then
            echo "Per-kind changelogs already current; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/changelogs
          git commit -m "docs(changelogs): regenerate per-kind changelogs"
          git push

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install conftest
        run: |
          curl -sSL -o /tmp/conftest.tgz \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          tar -xzf /tmp/conftest.tgz -C /tmp conftest
          sudo install -m 0755 /tmp/conftest /usr/local/bin/conftest
          conftest --version

      - name: Verify policies before publish
        run: conftest verify -p policy/

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Publish policies to GHCR
        env:
          REPO_LC: ${{ github.repository }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          REPO_LC=$(echo "$REPO_LC" | tr '[:upper:]' '[:lower:]')
          conftest push "oci://ghcr.io/${REPO_LC}:${VERSION}" policy/
          conftest push "oci://ghcr.io/${REPO_LC}:latest" policy/
