name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  # renovate: datasource=github-releases depName=open-policy-agent/conftest
  CONFTEST_VERSION: "0.68.2"

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release

  refresh-scope-changelogs:
    # After a release is tagged, regenerate the per-policy-domain changelogs
    # so their "Unreleased" entries roll over into the new version section.
    # release-please owns CHANGELOG.md; this job only touches docs/changelogs/.
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Regenerate per-domain changelogs
        run: make changelogs

      - name: Commit refreshed changelogs (if any)
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          if git diff --quiet -- docs/changelogs; then
            echo "No per-domain changelog updates for ${TAG}."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/changelogs
          # `chore:` keeps this out of CHANGELOG.md and out of version bumps;
          # `[skip ci]` prevents this bot commit from re-triggering workflows.
          git commit -m "chore: refresh per-domain changelogs for ${TAG} [skip ci]"
          git push origin main

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install conftest
        run: |
          curl -sSL -o /tmp/conftest.tgz \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          tar -xzf /tmp/conftest.tgz -C /tmp conftest
          sudo install -m 0755 /tmp/conftest /usr/local/bin/conftest
          conftest --version

      - name: Verify policies before publish
        run: conftest verify -p policy/

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Publish policies to GHCR
        env:
          REPO_LC: ${{ github.repository }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          REPO_LC=$(echo "$REPO_LC" | tr '[:upper:]' '[:lower:]')
          conftest push "oci://ghcr.io/${REPO_LC}:${VERSION}" policy/
          conftest push "oci://ghcr.io/${REPO_LC}:latest" policy/
